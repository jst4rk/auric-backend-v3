# Deploy auric-backend-v3 to Google Cloud Run
#
# Prerequisites (GCP): enable APIs (Cloud Run, Artifact Registry, IAM Credentials),
# create an Artifact Registry Docker repository, and a deployer service account with
# roles such as artifactregistry.writer, run.admin, and iam.serviceAccountUser as needed.
#
# GitHub repository Variables (Settings → Secrets and variables → Actions → Variables):
#   GCP_PROJECT_ID     — Google Cloud project ID
#   GCP_REGION         — e.g. us-central1 (must match Artifact Registry location)
#   AR_REPOSITORY      — Artifact Registry repository name (Docker format)
#   CLOUD_RUN_SERVICE  — Cloud Run service name
#   IMAGE_NAME         — image name under that repository, e.g. auric-backend-v3
#
# GitHub repository Secrets (Settings → Secrets and variables → Actions → Secrets):
#   SOPS_AGE_KEY — full contents of age.key (used to decrypt .env.enc)
#   SOPS_AGE_KEY — full contents of age.key (used to decrypt .env.enc)
#
#   GCP auth — pick ONE:
#
# (A) Workload Identity Federation (recommended):
#   GCP_WORKLOAD_IDENTITY_PROVIDER — full resource name, e.g.
#     projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
#   GCP_SERVICE_ACCOUNT — deployer SA email, e.g. github-deploy@PROJECT_ID.iam.gserviceaccount.com
#
# (B) Service account JSON key (replace the "Authenticate (WIF)" step below with the block in comments):
#   GCP_SA_JSON — entire JSON key file contents for the deployer service account
#
# Runtime: All environment variables are decrypted from .env.enc during CI/CD and injected into Cloud Run using --set-env-vars.
#
# CI installs SOPS from the official GitHub release binary (not apt); version must stay in sync with sops_version in .env.enc.

name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  REGISTRY_HOST: ${{ vars.GCP_REGION }}-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: develop
    env:
      SOPS_VERSION: "3.12.2"
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Install SOPS for decryption (official release; apt package is unavailable on hosted runners)
      - name: Install SOPS
        run: |
          set -euo pipefail
          VERSION="${SOPS_VERSION}"
          BASE="https://github.com/getsops/sops/releases/download/v${VERSION}"
          ASSET="sops-v${VERSION}.linux.amd64"
          curl -fsSL "${BASE}/${ASSET}" -o "${ASSET}"
          curl -fsSL "${BASE}/sops-v${VERSION}.checksums.txt" -o checksums.txt
          grep -F "${ASSET}" checksums.txt | sha256sum -c -
          sudo install -m 0755 "${ASSET}" /usr/local/bin/sops
          rm -f "${ASSET}" checksums.txt

      # 🔑 Setup SOPS age key from GitHub Secrets
      - name: Setup age key
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt
        
      # 🔓 Decrypt .env.enc → .env
      - name: Decrypt environment file
        run: | 
          sops -d .env.enc > .env

      # --- Authentication: use ONE of the following approaches ---
      #
      # (A) Workload Identity Federation (active):
      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # (B) Service account JSON key — remove step (A) and uncomment:
      # - name: Authenticate to Google Cloud (service account key)
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: ${{ secrets.GCP_SA_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$REGISTRY_HOST" --quiet

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPOSITORY }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPOSITORY }}/${{ vars.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          ENV_VARS=$(cat .env | grep -v '^#' | xargs)
          ENV_VARS=$(cat .env | grep -v '^#' | xargs)
          gcloud run deploy ${{ vars.CLOUD_RUN_SERVICE }} \
            --image "${{ env.REGISTRY_HOST }}/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPOSITORY }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}" \
            --region ${{ vars.GCP_REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} \
            --platform managed \
            --cpu=1 \
            --memory=256Mi \
            --min-instances=0 \
            --max-instances=1 \
            --set-env-vars $ENV_VARS \
            --set-env-vars $ENV_VARS \
            --allow-unauthenticated \
            --quiet
